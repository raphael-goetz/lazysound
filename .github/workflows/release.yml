name: "Release"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: "Build ${{ matrix.goos }}-${{ matrix.goarch }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "🔧 Setup Go"
        uses: actions/setup-go@v5
        with:
          cache: true
          go-version-file: go.mod

      - name: "Build binaries"
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          mkdir -p dist
          EXT=""
          if [ "${GOOS}" = "windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags="-s -w" -o "dist/lazysound-${GOOS}-${GOARCH}${EXT}" ./cmd/lazysound

      - name: "Package archive"
        run: |
          set -euo pipefail
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "lazysound-${{ matrix.goos }}-${{ matrix.goarch }}.zip" \
              "lazysound-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          else
            tar -czf "lazysound-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
              "lazysound-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi

      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    name: "Publish GitHub Release"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: "Download artifacts"
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: "Flatten artifacts"
        run: |
          mkdir -p release-assets-flat
          find release-assets -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets-flat/ \;
          ls -lah release-assets-flat

      - name: "Create / Update Release"
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets-flat/*
          generate_release_notes: true
